  <body>
    <div id="root"></div>

    <!--
      Static fallback for crawlers/social bots that don't execute JS (this is a
      client-rendered SPA, so the real <h1> only exists after React mounts).
      Visually hidden, sits outside #root so React never touches it.
    -->
    <h1
      id="fallback-h1"
      style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;"
    >
      Ali Imran Rodja — Full-Stack Developer Portfolio
    </h1>
    <script>
      // Drop the fallback the moment React mounts real content, so a JS-rendering
      // crawler (or a real visitor) only ever sees Hero's own <h1>, not both.
      (function () {
        var root = document.getElementById("root");
        var fallback = document.getElementById("fallback-h1");
        var observer = new MutationObserver(function () {
          if (root.querySelector("h1")) {
            fallback.remove();
            observer.disconnect();
          }
        });
        observer.observe(root, { childList: true, subtree: true });
      })();
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
